<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stock Report</title>
  <style>
    @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');

    :root {
      --bg: #0f0f0f;
      --card: #1a1a1a;
      --card-border: #2a2a2a;
      --text: #f5f5f5;
      --muted: #9ca3af;
      --accent: #3b82f6;
      --up: #22c55e;
      --down: #ef4444;
      --warn: #f59e0b;
    }

    * { box-sizing: border-box; }
    html, body, * {
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
    }
    body {
      margin: 0;
      padding: 16px;
      background: var(--bg);
      color: var(--text);
      font-size: 14px;
      line-height: 1.5;
    }

    .page-header {
      border-radius: 14px;
      padding: 18px 20px;
      margin-bottom: 16px;
      background: linear-gradient(135deg, var(--header-from, #1e3a8a), var(--header-to, #2563eb));
    }
    .page-header .label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      opacity: 0.9;
    }
    .page-header .title {
      font-size: 22px;
      font-weight: 800;
      margin-top: 6px;
    }
    .page-header .date {
      font-size: 12px;
      opacity: 0.85;
      margin-top: 6px;
    }

    .section-bar {
      font-size: 13px;
      font-weight: 800;
      margin: 20px 0 10px;
      padding-left: 10px;
      border-left: 3px solid var(--accent);
      color: var(--text);
    }

    .card {
      background: var(--card);
      border: 1px solid var(--card-border);
      border-radius: 14px;
      padding: 14px 16px;
      margin-bottom: 12px;
    }
    .card.highlight {
      border-color: #3b82f6;
      background: linear-gradient(180deg, #1e293b 0%, #1a1a1a 100%);
    }

    .muted { color: var(--muted); font-size: 12px; }
    .big-num {
      font-size: 26px;
      font-weight: 800;
      letter-spacing: -0.02em;
      line-height: 1.1;
    }
    .mid-num {
      font-size: 18px;
      font-weight: 700;
    }

    .up { color: var(--up); }
    .down { color: var(--down); }

    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .grid-3 {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }
    .grid-4 {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
    }
    @media (min-width: 520px) {
      .grid-4 { grid-template-columns: repeat(4, 1fr); }
    }

    .index-card, .indicator-card {
      background: #141414;
      border: 1px solid var(--card-border);
      border-radius: 12px;
      padding: 12px;
    }
    .index-label, .indicator-label {
      font-size: 11px;
      color: var(--muted);
      font-weight: 600;
    }
    .index-value, .indicator-value {
      font-size: 20px;
      font-weight: 800;
      margin-top: 4px;
    }
    .index-change, .indicator-change {
      font-size: 12px;
      font-weight: 700;
      margin-top: 2px;
    }

    .badge {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 700;
      margin: 0 4px 4px 0;
    }
    .badge-hot { background: #422006; color: #fdba74; }
    .badge-cold { background: #1e3a5f; color: #93c5fd; }
    .badge-warm { background: #3f2d0a; color: #fcd34d; }
    .badge-buy { background: #14532d; color: #86efac; }
    .badge-hold { background: #374151; color: #e5e7eb; }
    .badge-sell { background: #7f1d1d; color: #fca5a5; }
    .badge-neu { background: #292524; color: #d6d3d1; }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 8px;
    }
    th, td {
      padding: 8px 6px;
      text-align: left;
      font-size: 12px;
      border-bottom: 1px solid var(--card-border);
    }
    th { color: var(--muted); font-weight: 700; }

    .theme-card { margin-bottom: 12px; }
    .theme-head {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }
    .theme-name { font-size: 16px; font-weight: 800; }

    .stock-card { margin-bottom: 14px; }
    .stock-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 10px;
      margin-bottom: 10px;
    }
    .stock-name { font-size: 17px; font-weight: 800; }
    .stock-code { font-size: 11px; color: var(--muted); margin-left: 6px; }
    .verdict-pill {
      font-size: 13px;
      font-weight: 800;
      padding: 6px 14px;
      border-radius: 10px;
      white-space: nowrap;
    }
    .verdict-pill.buy { background: #14532d; color: #86efac; }
    .verdict-pill.hold { background: #374151; color: #f3f4f6; }
    .verdict-pill.sell { background: #7f1d1d; color: #fecaca; }

    .agent-votes {
      display: grid;
      grid-template-columns: 1fr;
      gap: 8px;
      margin: 12px 0;
    }
    @media (min-width: 520px) {
      .agent-votes { grid-template-columns: 1fr 1fr; }
    }
    .vote-chip {
      background: #141414;
      border: 1px solid var(--card-border);
      border-radius: 10px;
      padding: 10px;
    }
    .vote-chip.buy { border-color: #166534; }
    .vote-chip.sell { border-color: #991b1b; }
    .vote-role { font-size: 10px; color: var(--muted); font-weight: 700; }
    .vote-label { font-size: 14px; font-weight: 800; display: block; margin: 2px 0 4px; }
    .vote-reason { font-size: 11px; color: #d1d5db; display: block; margin-top: 2px; }

    .metric-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
      margin-top: 10px;
    }
    @media (min-width: 520px) {
      .metric-grid { grid-template-columns: repeat(4, 1fr); }
    }
    .metric-box {
      background: #141414;
      border-radius: 10px;
      padding: 10px;
      border: 1px solid var(--card-border);
    }
    .metric-label { font-size: 10px; color: var(--muted); font-weight: 600; }
    .metric-value { font-size: 15px; font-weight: 800; margin-top: 4px; }
    .metric-sub { font-size: 10px; color: var(--muted); margin-top: 2px; }

    .momentum-tags { margin-top: 8px; }
    .tag-heat-hot { background: #7c2d12; color: #fed7aa; }
    .tag-heat-cold { background: #1e3a8a; color: #bfdbfe; }
    .tag-heat-neu { background: #374151; color: #e5e7eb; }

    ul { margin: 0; padding-left: 18px; }
    li { margin-bottom: 6px; color: #e5e7eb; }

    .report-tabs-wrap {
      position: sticky;
      top: 0;
      z-index: 100;
      margin: 0 -16px 14px;
      padding: 8px 16px 10px;
      background: linear-gradient(180deg, var(--bg) 70%, rgba(15, 15, 15, 0.92) 100%);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }
    .report-tabs {
      display: flex;
      gap: 6px;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      padding-bottom: 2px;
    }
    .report-tabs::-webkit-scrollbar { display: none; }
    .tab-link {
      flex: 0 0 auto;
      padding: 10px 14px;
      border-radius: 10px;
      font-size: 12px;
      font-weight: 700;
      color: var(--muted);
      text-decoration: none;
      background: var(--card);
      border: 1px solid var(--card-border);
      white-space: nowrap;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
    }
    .tab-link:hover {
      color: var(--text);
      border-color: #404040;
    }
    .tab-link.active {
      color: #fff;
      background: linear-gradient(135deg, #1d4ed8, #2563eb);
      border-color: var(--accent);
      box-shadow: 0 2px 12px rgba(59, 130, 246, 0.35);
    }
    .report-section {
      scroll-margin-top: 76px;
      padding-bottom: 8px;
    }
    .report-section .section-bar:first-child {
      margin-top: 4px;
    }
  </style>
</head>
<body>
  {% block content %}{% endblock %}
  <script>
    (function () {
      var tabs = document.querySelectorAll(".tab-link");
      var sectionIds = ["section-market", "section-themes", "section-stocks", "section-risk"];
      if (!tabs.length) return;

      function setActive(id) {
        tabs.forEach(function (tab) {
          var on = tab.getAttribute("data-section") === id;
          tab.classList.toggle("active", on);
          if (on) tab.setAttribute("aria-selected", "true");
          else tab.removeAttribute("aria-selected");
        });
      }

      tabs.forEach(function (tab) {
        tab.addEventListener("click", function (e) {
          e.preventDefault();
          var id = tab.getAttribute("data-section");
          var el = document.getElementById(id);
          if (el) {
            el.scrollIntoView({ behavior: "smooth", block: "start" });
            setActive(id);
          }
        });
      });

      function updateActiveOnScroll() {
        var offset = 88;
        var current = sectionIds[0];
        sectionIds.forEach(function (id) {
          var el = document.getElementById(id);
          if (el && el.getBoundingClientRect().top <= offset) current = id;
        });
        setActive(current);
      }

      window.addEventListener("scroll", updateActiveOnScroll, { passive: true });
      updateActiveOnScroll();
    })();
  </script>
</body>
</html>

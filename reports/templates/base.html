<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="color-scheme" content="dark">
  <title>{{ report_title | default('Stock Report') }}</title>
  <style>
    @font-face {
      font-family: 'Pretendard';
      src: url('../static/fonts/PretendardVariable.ttf') format('truetype');
      font-weight: 45 920;
      font-display: swap;
    }
    @font-face {
      font-family: 'Pretendard';
      src: url('../static/fonts/Pretendard-Regular.ttf') format('truetype');
      font-weight: 400;
      font-display: swap;
    }
    @font-face {
      font-family: 'Pretendard';
      src: url('../static/fonts/Pretendard-Medium.ttf') format('truetype');
      font-weight: 500;
      font-display: swap;
    }
    @font-face {
      font-family: 'Pretendard';
      src: url('../static/fonts/Pretendard-SemiBold.ttf') format('truetype');
      font-weight: 600;
      font-display: swap;
    }
    @font-face {
      font-family: 'Pretendard';
      src: url('../static/fonts/Pretendard-Bold.ttf') format('truetype');
      font-weight: 700;
      font-display: swap;
    }

    :root {
      --bg: #111111;
      --line: #2a2a2a;
      --line-strong: #3d3d3d;
      --text: #f4f4f5;
      --text-secondary: #d4d4d8;
      --ref: #71717a;
      --accent: #3b82f6;
      --up: #60a5fa;
      --down: #f87171;
      --warn: #fbbf24;
      --tab-h: 48px;
    }

    *, *::before, *::after { box-sizing: border-box; }
    html { scroll-behavior: smooth; -webkit-text-size-adjust: 100%; }

    body {
      margin: 0;
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 14px;
      line-height: 1.55;
      color: var(--text);
      background: var(--bg);
      padding-bottom: 56px;
    }

    .report-shell {
      max-width: 640px;
      margin: 0 auto;
      padding: 8px 18px 0;
    }

    /* ── Tabs (minimal pills) ── */
    .report-tabs-wrap {
      position: sticky;
      top: 0;
      z-index: 200;
      margin: 0 -18px 20px;
      padding: 10px 18px 12px;
      background: rgba(17, 17, 17, 0.94);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--line);
    }
    .report-tabs {
      display: flex;
      gap: 6px;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .report-tabs::-webkit-scrollbar { display: none; }
    .tab-link {
      flex: 0 0 auto;
      padding: 7px 12px;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 600;
      color: var(--ref);
      text-decoration: none;
      border: 1px solid transparent;
      white-space: nowrap;
    }
    .tab-link.active {
      color: var(--text);
      border-color: var(--line-strong);
      background: rgba(255, 255, 255, 0.04);
    }

    .report-section {
      scroll-margin-top: calc(var(--tab-h) + 20px);
      margin-bottom: 40px;
    }

    .block { margin-bottom: 28px; }
    .block-label {
      margin: 0 0 12px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--ref);
    }
    .block-label-sm {
      margin: 0 0 10px;
      font-size: 12px;
      font-weight: 600;
      color: var(--ref);
    }

    .ref { color: var(--ref); font-size: 12px; }
    .up { color: var(--up); }
    .down { color: var(--down); }
    .empty-state { color: var(--ref); font-size: 13px; padding: 16px 0; }

    /* ── Tab1: Market hero ── */
    .market-hero {
      padding: 8px 0 28px;
      margin-bottom: 8px;
      border-bottom: 1px solid var(--line);
    }
    .hero-meta {
      margin: 0 0 12px;
      font-size: 11px;
      font-weight: 500;
      color: var(--ref);
      letter-spacing: 0.02em;
    }
    .hero-phase {
      margin: 0;
      font-size: clamp(2.25rem, 10vw, 3rem);
      font-weight: 800;
      letter-spacing: -0.04em;
      line-height: 1.05;
    }
    .hero-phase.phase_risk_off,
    .hero-phase.phase_bearish,
    .hero-phase.phase_weak { color: var(--down); }
    .hero-phase.phase_neutral,
    .hero-phase.phase_sideways { color: var(--text-secondary); }
    .hero-phase.phase_bullish,
    .hero-phase.phase_risk_on,
    .hero-phase.phase_strong { color: var(--up); }
    .hero-summary {
      margin: 14px 0 0;
      font-size: 17px;
      font-weight: 500;
      line-height: 1.45;
      color: var(--text-secondary);
      letter-spacing: -0.02em;
    }

    /* KR indices — large, no boxes */
    .idx-kr {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px 24px;
    }
    .idx-kr-item {
      display: flex;
      flex-direction: column;
      gap: 4px;
      padding-bottom: 4px;
      border-bottom: 1px solid var(--line);
    }
    .idx-kr-name {
      font-size: 12px;
      font-weight: 600;
      color: var(--ref);
    }
    .idx-kr-val {
      font-size: clamp(1.5rem, 6vw, 1.85rem);
      font-weight: 800;
      letter-spacing: -0.03em;
      line-height: 1.1;
    }
    .idx-kr-chg {
      font-size: 14px;
      font-weight: 700;
    }

    /* Lightweight tables */
    .data-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    .data-table th,
    .data-table td {
      padding: 8px 6px;
      border-bottom: 1px solid var(--line);
      text-align: left;
      vertical-align: middle;
    }
    .data-table th {
      font-weight: 600;
      color: var(--ref);
      width: 38%;
    }
    .data-table .num {
      font-weight: 700;
      font-variant-numeric: tabular-nums;
    }
    .data-table .chg {
      font-size: 12px;
      font-weight: 600;
      text-align: right;
      white-space: nowrap;
    }
    .data-table-macro thead th {
      font-size: 10px;
      font-weight: 600;
      color: var(--ref);
      text-align: center;
      padding: 6px 4px;
      border-bottom: 1px solid var(--line-strong);
    }
    .data-table-macro tbody td {
      text-align: center;
      padding: 10px 4px;
      border-bottom: none;
    }
    .macro-val {
      display: block;
      font-weight: 700;
      font-size: 13px;
    }
    .macro-chg {
      display: block;
      font-size: 10px;
      margin-top: 2px;
    }
    .theme-table .rank { color: var(--ref); width: 28px; }
    .theme-table .name { font-weight: 600; }
    .theme-table .ratio { color: var(--warn); font-weight: 700; }

    /* Sector inline */
    .sector-inline {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 6px 8px;
      font-size: 13px;
      line-height: 1.6;
    }
    .sector-label { font-size: 11px; font-weight: 600; color: var(--ref); }
    .sector-sep { color: var(--line-strong); margin: 0 4px; }
    .tag {
      font-size: 12px;
      font-weight: 600;
      padding: 2px 0;
    }
    .tag-in { color: var(--up); }
    .tag-out { color: var(--down); }

    /* ── Tab2: Theme hero + table ── */
    .theme-hero {
      padding: 20px 0 22px;
      margin-bottom: 4px;
      border-bottom: 2px solid var(--line-strong);
    }
    .theme-hero-top {
      display: flex;
      align-items: flex-start;
      gap: 14px;
    }
    .theme-rank {
      font-size: 2rem;
      font-weight: 800;
      color: var(--warn);
      line-height: 1;
      letter-spacing: -0.04em;
    }
    .theme-hero-name {
      margin: 0;
      font-size: 1.5rem;
      font-weight: 800;
      letter-spacing: -0.03em;
    }
    .theme-hero-ratio {
      margin: 6px 0 0;
      font-size: 15px;
      font-weight: 700;
      color: var(--warn);
    }
    .theme-hero-meta {
      margin: 14px 0 0 44px;
      font-size: 14px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px 16px;
    }

    /* ── Tab3: Stock analysis ── */
    .stock-block {
      padding: 24px 0;
      border-bottom: 1px solid var(--line);
    }
    .stock-block:last-child { border-bottom: none; }

    .stock-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
    }
    .stock-title {
      margin: 0;
      font-size: 1.35rem;
      font-weight: 800;
      letter-spacing: -0.03em;
    }
    .stock-code {
      margin-left: 8px;
      font-size: 12px;
      font-weight: 600;
      color: var(--ref);
    }
    .stock-price-line {
      margin: 8px 0 0;
      display: flex;
      align-items: baseline;
      gap: 10px;
    }
    .stock-price {
      font-size: 1.25rem;
      font-weight: 800;
      font-variant-numeric: tabular-nums;
    }
    .stock-change {
      font-size: 15px;
      font-weight: 700;
    }
    .stock-meta {
      margin: 10px 0 16px;
      line-height: 1.5;
    }

    .verdict-badge {
      flex-shrink: 0;
      padding: 10px 16px;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 800;
      letter-spacing: -0.02em;
      border: 1px solid transparent;
    }
    .verdict-badge.buy {
      color: #dbeafe;
      background: rgba(37, 99, 235, 0.25);
      border-color: #2563eb;
    }
    .verdict-badge.hold {
      color: #e5e7eb;
      background: rgba(55, 65, 81, 0.4);
      border-color: #4b5563;
    }
    .verdict-badge.sell {
      color: #fecaca;
      background: rgba(153, 27, 27, 0.35);
      border-color: #b91c1c;
    }

    /* Agent row + accordion */
    .agent-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    @media (max-width: 520px) {
      .agent-row { flex-direction: column; }
    }
    .agent-acc {
      flex: 1 1 calc(20% - 8px);
      min-width: 88px;
    }
    @media (max-width: 520px) {
      .agent-acc { flex: 1 1 100%; min-width: 0; }
    }
    .agent-acc > summary {
      list-style: none;
      cursor: pointer;
    }
    .agent-acc > summary::-webkit-details-marker { display: none; }
    .agent-chip {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      padding: 8px 4px;
      border: none;
      background: transparent;
      text-align: center;
    }
    .agent-acc[open] .agent-name { color: var(--text); }
    .agent-emoji { font-size: 20px; line-height: 1; }
    .agent-name {
      font-size: 10px;
      font-weight: 600;
      color: var(--text-secondary);
      line-height: 1.2;
    }
    .vote-pill {
      font-size: 11px;
      font-weight: 800;
      padding: 2px 8px;
      border-radius: 6px;
    }
    .vote-pill.buy { background: #1d4ed8; color: #eff6ff; }
    .vote-pill.hold { background: #374151; color: #f3f4f6; }
    .vote-pill.sell { background: #991b1b; color: #fecaca; }
    .acc-panel {
      margin-top: 8px;
      padding: 10px 12px;
      border-left: 2px solid var(--line-strong);
    }
    .agent-title { margin: 0 0 6px; }
    .acc-text {
      margin: 0 0 6px;
      font-size: 12px;
      color: var(--text-secondary);
      line-height: 1.45;
    }
    .acc-text:last-child { margin-bottom: 0; }

    /* ── Tab4: Company ── */
    .company-block {
      padding: 24px 0;
      border-bottom: 1px solid var(--line);
    }
    .company-block:last-child { border-bottom: none; }
    .company-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 12px;
    }
    .company-name {
      margin: 0;
      font-size: 1.25rem;
      font-weight: 800;
      letter-spacing: -0.02em;
    }
    .company-oneliner {
      margin: 8px 0 0;
      font-size: 16px;
      font-weight: 500;
      color: var(--text-secondary);
      line-height: 1.4;
    }
    .company-meta { margin: 6px 0 0; }
    .why-hot-text {
      margin: 0 0 14px;
      font-size: 15px;
      font-weight: 600;
      line-height: 1.5;
      color: #93c5fd;
    }
    .body-text {
      margin: 0 0 12px;
      font-size: 14px;
      line-height: 1.6;
      color: var(--text-secondary);
    }
    .inline-fact {
      margin: 0 0 8px;
      font-size: 13px;
      line-height: 1.5;
    }
    .inline-fact.risk-fact { color: #fca5a5; }

    /* ── Tab5: Risk ── */
    .risk-line {
      margin: 0 0 28px;
      font-size: clamp(1.1rem, 4.5vw, 1.35rem);
      font-weight: 700;
      line-height: 1.45;
      color: var(--down);
      letter-spacing: -0.02em;
    }
    .action-ol {
      margin: 0;
      padding-left: 1.25rem;
      color: var(--text-secondary);
      font-size: 14px;
    }
    .action-ol li {
      margin-bottom: 10px;
      padding-left: 4px;
    }
    .action-ol li::marker {
      color: var(--accent);
      font-weight: 700;
    }

    .glossary-acc {
      margin-top: 24px;
      border-top: 1px solid var(--line);
      padding-top: 16px;
    }
    .glossary-acc > summary {
      cursor: pointer;
      font-size: 12px;
      font-weight: 600;
      color: var(--ref);
      list-style: none;
    }
    .glossary-acc > summary::-webkit-details-marker { display: none; }
    .glossary-body { margin-top: 12px; }
    .glossary-row {
      padding: 10px 0;
      border-bottom: 1px solid var(--line);
    }
    .glossary-row:last-child { border-bottom: none; }
    .glossary-row dt {
      font-size: 13px;
      font-weight: 700;
      color: var(--text);
    }
    .glossary-row dd {
      margin: 4px 0 0;
      font-size: 12px;
      color: var(--ref);
    }
  </style>
</head>
<body>
  <div class="report-shell">
    {% block content %}{% endblock %}
  </div>
  <script>
    (function () {
      var tabs = document.querySelectorAll(".tab-link");
      var sectionIds = ["section-market", "section-themes", "section-stocks"];
      if (document.getElementById("section-company")) {
        sectionIds.push("section-company");
      }
      sectionIds.push("section-risk");
      if (!tabs.length) return;

      function setActive(id) {
        tabs.forEach(function (tab) {
          var on = tab.getAttribute("data-section") === id;
          tab.classList.toggle("active", on);
          tab.setAttribute("aria-selected", on ? "true" : "false");
        });
      }

      tabs.forEach(function (tab) {
        tab.addEventListener("click", function (e) {
          e.preventDefault();
          var el = document.getElementById(tab.getAttribute("data-section"));
          if (el) {
            el.scrollIntoView({ behavior: "smooth", block: "start" });
            setActive(tab.getAttribute("data-section"));
          }
        });
      });

      function onScroll() {
        var offset = 64;
        var current = sectionIds[0];
        sectionIds.forEach(function (id) {
          var el = document.getElementById(id);
          if (el && el.getBoundingClientRect().top <= offset) current = id;
        });
        setActive(current);
      }
      window.addEventListener("scroll", onScroll, { passive: true });
      onScroll();
    })();
  </script>
</body>
</html>

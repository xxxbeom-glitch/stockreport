<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
  <meta name="color-scheme" content="light">
  <title>{{ report_title | default('마켓 브리핑') }}</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <style>
    :root {
      --bg: #ffffff;
      --text: #111111;
      --muted: #6b7280;
      --line: #e5e7eb;
      --accent: #1d4ed8;
      --up: #1d4ed8;
      --down: #dc2626;
      --pad: 16px;
      --max-w: 390px;
    }
    *, *::before, *::after { box-sizing: border-box; }
    html { -webkit-text-size-adjust: 100%; scroll-behavior: smooth; }
    body {
      margin: 0 auto;
      max-width: var(--max-w);
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 14px;
      line-height: 1.55;
      color: var(--text);
      background: var(--bg);
    }
    .shell { padding-bottom: 48px; }
    .page-head {
      padding: 20px var(--pad) 12px;
      border-bottom: 1px solid var(--line);
    }
    .page-meta { font-size: 12px; color: var(--muted); margin: 0 0 4px; }
    .page-market { font-size: 13px; font-weight: 600; margin: 0 0 12px; }
    .phase-title {
      margin: 0 0 8px;
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.02em;
      line-height: 1.25;
    }
    .phase-summary { margin: 0; font-size: 14px; color: var(--muted); line-height: 1.5; }
    .tabs-wrap {
      position: sticky;
      top: 0;
      z-index: 50;
      background: rgba(255,255,255,0.97);
      backdrop-filter: blur(6px);
      border-bottom: 1px solid var(--line);
    }
    .tabs {
      display: flex;
      gap: 0;
      overflow-x: auto;
      scrollbar-width: none;
      padding: 0 8px;
    }
    .tabs::-webkit-scrollbar { display: none; }
    .tab {
      flex: 0 0 auto;
      padding: 12px 10px;
      font-size: 13px;
      font-weight: 500;
      color: var(--muted);
      text-decoration: none;
      border-bottom: 2px solid transparent;
      white-space: nowrap;
    }
    .tab.active { color: var(--accent); font-weight: 700; border-bottom-color: var(--accent); }
    .section {
      padding: 20px var(--pad);
      border-bottom: 8px solid #f3f4f6;
      scroll-margin-top: 48px;
    }
    .section:last-child { border-bottom: none; }
    .h1 { margin: 0 0 16px; font-size: 18px; font-weight: 700; }
    .h2 { margin: 20px 0 10px; font-size: 14px; font-weight: 700; color: var(--text); }
    .h2:first-child { margin-top: 0; }
    .lead { font-size: 15px; font-weight: 600; margin: 0 0 8px; }
    .sub { font-size: 12px; color: var(--muted); margin: 0 0 12px; }
    .up { color: var(--up); }
    .down { color: var(--down); }
    .muted { color: var(--muted); }
    .idx-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 16px;
    }
    .idx-card {
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
    }
    .idx-name { font-size: 12px; font-weight: 600; color: var(--muted); }
    .idx-val { font-size: 18px; font-weight: 700; margin-top: 4px; font-variant-numeric: tabular-nums; }
    .idx-chg { font-size: 13px; font-weight: 600; margin-top: 2px; }
    .table-wrap { overflow-x: auto; margin: 8px 0 16px; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th, td {
      padding: 8px 6px;
      border-bottom: 1px solid var(--line);
      text-align: left;
      vertical-align: top;
    }
    th { font-size: 11px; font-weight: 600; color: var(--muted); }
    .num { font-variant-numeric: tabular-nums; font-weight: 600; }
    .tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
    .tag {
      font-size: 12px;
      padding: 4px 8px;
      border-radius: 4px;
      background: #f3f4f6;
    }
    .tag.in { color: var(--up); background: #eff6ff; }
    .tag.out { color: var(--down); background: #fef2f2; }
    .theme-name { font-size: 13px; font-weight: 700; margin: 16px 0 8px; }
    .wl-row {
      font-size: 13px;
      padding: 8px 0;
      border-bottom: 1px solid var(--line);
      line-height: 1.45;
    }
    .stock-card {
      padding: 16px 0;
      border-bottom: 1px solid var(--line);
    }
    .stock-card:last-child { border-bottom: none; }
    .stock-top {
      display: flex;
      flex-wrap: wrap;
      align-items: baseline;
      gap: 8px;
      margin-bottom: 12px;
    }
    .stock-name { font-size: 17px; font-weight: 700; margin: 0; }
    .stock-price { font-size: 16px; font-weight: 700; }
    .badge {
      font-size: 11px;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 4px;
      background: #f3f4f6;
    }
    .badge.buy { color: var(--up); background: #eff6ff; }
    .badge.sell { color: var(--down); background: #fef2f2; }
    .range-bar {
      height: 6px;
      background: var(--line);
      border-radius: 3px;
      position: relative;
      margin: 8px 0 4px;
    }
    .range-fill {
      position: absolute;
      left: 0; top: 0; bottom: 0;
      background: var(--accent);
      opacity: 0.25;
      border-radius: 3px;
    }
    .range-dot {
      position: absolute;
      top: 50%;
      width: 10px; height: 10px;
      margin: -5px 0 0 -5px;
      background: var(--accent);
      border: 2px solid #fff;
      border-radius: 50%;
    }
    .range-cap { font-size: 11px; color: var(--muted); margin: 0 0 12px; }
    .buy-card {
      padding: 16px 0;
      border-bottom: 1px solid var(--line);
    }
    .buy-reason {
      font-size: 13px;
      line-height: 1.6;
      margin: 8px 0;
      white-space: pre-line;
    }
    .stop-line { font-size: 12px; color: var(--down); font-weight: 600; margin: 0; }
    .risk-box {
      font-size: 16px;
      font-weight: 700;
      color: var(--down);
      line-height: 1.45;
      margin: 0 0 16px;
    }
    .disclaimer { font-size: 11px; color: var(--muted); line-height: 1.55; margin-top: 16px; }
    .empty { font-size: 13px; color: var(--muted); }
    .ai-comment { font-size: 12px; color: var(--muted); display: block; margin-top: 2px; }
    .vote-buy { color: var(--up); font-weight: 700; }
    .vote-sell { color: var(--down); font-weight: 700; }
    .vote-hold { color: var(--muted); font-weight: 700; }
    .agent-comment { font-size: 13px; line-height: 1.65; color: var(--text); max-width: 100%; }
  </style>
</head>
<body>
  <div class="shell" id="app">
    {% block content %}{% endblock %}
  </div>
  <script>
    (function () {
      var tabs = document.querySelectorAll('.tab');
      var ids = ['tab-market','tab-themes','tab-stocks','tab-buys','tab-risk'];
      function setActive(id) {
        tabs.forEach(function (t) {
          var on = t.getAttribute('href') === '#' + id;
          t.classList.toggle('active', on);
        });
      }
      tabs.forEach(function (tab) {
        tab.addEventListener('click', function (e) {
          e.preventDefault();
          var el = document.getElementById(tab.getAttribute('href').slice(1));
          if (el) { el.scrollIntoView({ behavior: 'smooth', block: 'start' }); setActive(tab.getAttribute('href').slice(1)); }
        });
      });
      window.addEventListener('scroll', function () {
        var cur = ids[0];
        ids.forEach(function (id) {
          var el = document.getElementById(id);
          if (el && el.getBoundingClientRect().top <= 52) cur = id;
        });
        setActive(cur);
      }, { passive: true });
    })();
  </script>
</body>
</html>

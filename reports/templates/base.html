<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="color-scheme" content="dark">
  <title>{{ report_title | default('Stock Report') }}</title>
  <style>
    @font-face {
      font-family: 'Pretendard';
      src: url('../static/fonts/PretendardVariable.ttf') format('truetype');
      font-weight: 45 920;
      font-style: normal;
      font-display: swap;
    }
    @font-face {
      font-family: 'Pretendard';
      src: url('../static/fonts/Pretendard-Regular.ttf') format('truetype');
      font-weight: 400;
      font-display: swap;
    }
    @font-face {
      font-family: 'Pretendard';
      src: url('../static/fonts/Pretendard-Medium.ttf') format('truetype');
      font-weight: 500;
      font-display: swap;
    }
    @font-face {
      font-family: 'Pretendard';
      src: url('../static/fonts/Pretendard-SemiBold.ttf') format('truetype');
      font-weight: 600;
      font-display: swap;
    }
    @font-face {
      font-family: 'Pretendard';
      src: url('../static/fonts/Pretendard-Bold.ttf') format('truetype');
      font-weight: 700;
      font-display: swap;
    }

    :root {
      --bg: #0f0f0f;
      --bg-elevated: #141414;
      --card: #1a1a1a;
      --card-hover: #222222;
      --border: #2a2a2a;
      --border-strong: #3a3a3a;
      --text: #f5f5f5;
      --text-secondary: #d1d5db;
      --muted: #9ca3af;
      --accent: #3b82f6;
      --accent-dim: #1e3a8a;
      --up: #60a5fa;
      --down: #f87171;
      --hold: #9ca3af;
      --warn: #fbbf24;
      --radius: 14px;
      --radius-sm: 10px;
      --shadow: 0 8px 32px rgba(0, 0, 0, 0.45);
      --tab-height: 52px;
      --header-from: #1e3a8a;
      --header-to: #2563eb;
    }

    *, *::before, *::after { box-sizing: border-box; }

    html {
      scroll-behavior: smooth;
      -webkit-text-size-adjust: 100%;
    }

    body {
      margin: 0;
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 14px;
      line-height: 1.55;
      color: var(--text);
      background: var(--bg);
      padding: 0 0 48px;
    }

    .report-shell {
      max-width: 640px;
      margin: 0 auto;
      padding: 12px 16px 0;
    }

    /* ── Sticky tab bar ── */
    .report-tabs-wrap {
      position: sticky;
      top: 0;
      z-index: 200;
      margin: 0 -16px 16px;
      padding: 10px 16px 12px;
      background: linear-gradient(180deg, rgba(15, 15, 15, 0.98) 0%, rgba(15, 15, 15, 0.88) 100%);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
    }

    .report-tabs {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      padding: 2px 0;
    }
    .report-tabs::-webkit-scrollbar { display: none; }

    .tab-link {
      flex: 0 0 auto;
      min-height: 40px;
      padding: 8px 14px;
      border-radius: var(--radius-sm);
      font-size: 12px;
      font-weight: 700;
      color: var(--muted);
      text-decoration: none;
      background: var(--card);
      border: 1px solid var(--border);
      white-space: nowrap;
      transition: color 0.15s, background 0.15s, border-color 0.15s, box-shadow 0.15s;
    }
    .tab-link:hover {
      color: var(--text);
      border-color: var(--border-strong);
    }
    .tab-link.active {
      color: #fff;
      background: linear-gradient(135deg, var(--accent-dim), var(--accent));
      border-color: var(--accent);
      box-shadow: 0 4px 16px rgba(59, 130, 246, 0.4);
    }

    /* ── Sections ── */
    .report-section {
      scroll-margin-top: calc(var(--tab-height) + 16px);
      margin-bottom: 24px;
    }

    .section-title {
      font-size: 13px;
      font-weight: 800;
      letter-spacing: -0.01em;
      margin: 0 0 12px;
      padding-left: 10px;
      border-left: 3px solid var(--accent);
      color: var(--text);
    }

    /* ── Header ── */
    .page-header {
      border-radius: var(--radius);
      padding: 20px;
      margin-bottom: 16px;
      background: linear-gradient(145deg, var(--header-from), var(--header-to));
      box-shadow: var(--shadow);
    }
    .page-header .report-type {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      opacity: 0.92;
    }
    .page-header .report-date {
      font-size: 12px;
      opacity: 0.85;
      margin-top: 4px;
    }
    .page-header .phase-label {
      font-size: 11px;
      color: rgba(255, 255, 255, 0.75);
      margin-top: 14px;
    }
    .page-header .phase-value {
      font-size: 22px;
      font-weight: 800;
      margin-top: 4px;
      letter-spacing: -0.02em;
    }
    .page-header .summary {
      font-size: 13px;
      line-height: 1.5;
      margin-top: 10px;
      opacity: 0.92;
    }

    /* ── Cards ── */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      margin-bottom: 12px;
    }

    .muted { color: var(--muted); font-size: 12px; }

    /* ── Index / macro grids ── */
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .grid-3 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
    .grid-6 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }

    @media (min-width: 480px) {
      .grid-3 { grid-template-columns: repeat(3, 1fr); }
      .grid-6 { grid-template-columns: repeat(3, 1fr); }
    }
    @media (min-width: 560px) {
      .grid-6 { grid-template-columns: repeat(3, 1fr); }
    }

    .stat-card {
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 14px 12px;
    }
    .stat-label {
      font-size: 11px;
      font-weight: 600;
      color: var(--muted);
    }
    .stat-value {
      font-size: 22px;
      font-weight: 800;
      letter-spacing: -0.03em;
      margin-top: 6px;
      line-height: 1.1;
    }
    .stat-change {
      font-size: 12px;
      font-weight: 700;
      margin-top: 4px;
    }

    .up { color: var(--up); }
    .down { color: var(--down); }

    /* ── Sector tags ── */
    .tag-row { display: flex; flex-wrap: wrap; gap: 6px; }
    .badge {
      display: inline-flex;
      align-items: center;
      padding: 6px 12px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 700;
    }
    .badge-in { background: #172554; color: #93c5fd; border: 1px solid #1d4ed8; }
    .badge-out { background: #450a0a; color: #fca5a5; border: 1px solid #991b1b; }
    .badge-warm { background: #422006; color: #fcd34d; }

    /* ── Hot theme stock cards ── */
    .leader-card {
      display: flex;
      flex-direction: column;
      gap: 8px;
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 14px;
      margin-bottom: 10px;
    }
    .leader-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 8px;
    }
    .leader-name { font-size: 16px; font-weight: 800; }
    .leader-ratio {
      font-size: 14px;
      font-weight: 800;
      color: var(--warn);
      white-space: nowrap;
    }
    .leader-meta {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      font-size: 12px;
    }
    .leader-meta dt { color: var(--muted); font-weight: 600; }
    .leader-meta dd { margin: 2px 0 0; font-weight: 700; color: var(--text-secondary); }

    /* ── Stock analysis ── */
    .stock-card { margin-bottom: 16px; }

    .stock-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 14px;
    }
    .stock-name { font-size: 18px; font-weight: 800; }
    .stock-code { font-size: 11px; color: var(--muted); margin-left: 6px; font-weight: 600; }

    .stock-stats {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
      margin-bottom: 14px;
    }
    @media (min-width: 480px) {
      .stock-stats { grid-template-columns: repeat(4, 1fr); }
    }
    .stock-stat {
      background: var(--bg-elevated);
      border-radius: var(--radius-sm);
      padding: 10px;
      border: 1px solid var(--border);
    }
    .stock-stat .label { font-size: 10px; color: var(--muted); font-weight: 600; }
    .stock-stat .value { font-size: 14px; font-weight: 800; margin-top: 4px; }

    .agent-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
      margin: 14px 0;
    }
    @media (min-width: 520px) {
      .agent-grid { grid-template-columns: 1fr 1fr; }
    }

    .agent-card {
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 12px;
    }
    .agent-card.vote-buy { border-color: #2563eb; background: linear-gradient(180deg, #0f172a 0%, #141414 100%); }
    .agent-card.vote-sell { border-color: #b91c1c; background: linear-gradient(180deg, #1c0a0a 0%, #141414 100%); }
    .agent-card.vote-hold { border-color: #4b5563; }

    .agent-head {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 8px;
    }
    .agent-emoji { font-size: 22px; line-height: 1; }
    .agent-name { font-size: 13px; font-weight: 800; }
    .agent-title { font-size: 11px; color: var(--muted); margin-top: 1px; }
    .vote-badge {
      margin-left: auto;
      padding: 4px 10px;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 800;
      flex-shrink: 0;
    }
    .vote-badge.buy { background: #1d4ed8; color: #dbeafe; }
    .vote-badge.hold { background: #374151; color: #e5e7eb; }
    .vote-badge.sell { background: #991b1b; color: #fecaca; }

    .agent-reason {
      font-size: 11px;
      color: var(--text-secondary);
      line-height: 1.45;
    }
    .agent-reason + .agent-reason { margin-top: 4px; }

    .verdict-hero {
      text-align: center;
      padding: 16px;
      border-radius: var(--radius-sm);
      margin-top: 12px;
      font-size: 24px;
      font-weight: 800;
      letter-spacing: -0.02em;
    }
    .verdict-hero.buy {
      background: linear-gradient(135deg, #1e3a8a, #2563eb);
      color: #fff;
      box-shadow: 0 4px 20px rgba(37, 99, 235, 0.35);
    }
    .verdict-hero.hold {
      background: #374151;
      color: #f3f4f6;
    }
    .verdict-hero.sell {
      background: linear-gradient(135deg, #7f1d1d, #dc2626);
      color: #fff;
      box-shadow: 0 4px 20px rgba(220, 38, 38, 0.3);
    }

    .vote-summary {
      text-align: center;
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 8px;
    }

    /* ── Risk tab ── */
    .risk-alert {
      background: linear-gradient(180deg, #450a0a 0%, #1a1a1a 100%);
      border: 1px solid #991b1b;
      border-radius: var(--radius);
      padding: 18px;
      margin-bottom: 14px;
      font-size: 15px;
      font-weight: 600;
      line-height: 1.5;
      color: #fecaca;
    }
    .risk-alert::before {
      content: '⚠️ ';
    }

    .checklist {
      list-style: none;
      margin: 0;
      padding: 0;
    }
    .checklist li {
      position: relative;
      padding: 10px 10px 10px 32px;
      margin-bottom: 8px;
      background: var(--bg-elevated);
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      font-size: 13px;
    }
    .checklist li::before {
      content: '☐';
      position: absolute;
      left: 10px;
      color: var(--accent);
      font-weight: 700;
    }

    .glossary { margin-top: 8px; }
    .glossary-item {
      padding: 12px 0;
      border-bottom: 1px solid var(--border);
    }
    .glossary-item:last-child { border-bottom: none; }
    .glossary-term { font-size: 13px; font-weight: 800; color: var(--accent); }
    .glossary-def { font-size: 12px; color: var(--muted); margin-top: 4px; }

    .empty-state {
      text-align: center;
      padding: 24px;
      color: var(--muted);
      font-size: 13px;
    }

    .company-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 8px;
    }
    .company-meta { margin: 6px 0 0; font-size: 12px; }
    .company-oneliner { font-size: 13px; margin: 10px 0; opacity: 0.92; }
    .why-hot-box {
      background: linear-gradient(180deg, #172554 0%, #1a1a1a 100%);
      border: 1px solid #2563eb;
      border-radius: var(--radius-sm);
      padding: 14px;
      margin: 12px 0;
      font-size: 13px;
      line-height: 1.55;
    }
    .company-verdict {
      flex-shrink: 0;
      padding: 6px 14px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 800;
    }
    .company-verdict.buy { background: #1d4ed8; color: #fff; }
    .company-verdict.hold { background: #374151; color: #e5e7eb; }
    .company-verdict.sell { background: #991b1b; color: #fecaca; }
  </style>
</head>
<body>
  <div class="report-shell">
    {% block content %}{% endblock %}
  </div>
  <script>
    (function () {
      var tabs = document.querySelectorAll(".tab-link");
      var sectionIds = ["section-market", "section-themes", "section-stocks"];
      if (document.getElementById("section-company")) {
        sectionIds.push("section-company");
      }
      sectionIds.push("section-risk");
      if (!tabs.length) return;

      function setActive(id) {
        tabs.forEach(function (tab) {
          var on = tab.getAttribute("data-section") === id;
          tab.classList.toggle("active", on);
          tab.setAttribute("aria-selected", on ? "true" : "false");
        });
      }

      tabs.forEach(function (tab) {
        tab.addEventListener("click", function (e) {
          e.preventDefault();
          var id = tab.getAttribute("data-section");
          var el = document.getElementById(id);
          if (el) {
            el.scrollIntoView({ behavior: "smooth", block: "start" });
            setActive(id);
          }
        });
      });

      function updateActiveOnScroll() {
        var offset = 72;
        var current = sectionIds[0];
        sectionIds.forEach(function (id) {
          var el = document.getElementById(id);
          if (el && el.getBoundingClientRect().top <= offset) {
            current = id;
          }
        });
        setActive(current);
      }

      window.addEventListener("scroll", updateActiveOnScroll, { passive: true });
      updateActiveOnScroll();
    })();
  </script>
</body>
</html>

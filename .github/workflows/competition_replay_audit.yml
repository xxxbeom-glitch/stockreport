name: "REPLAY · 과거 투자 검증"

on:
  workflow_dispatch:
    inputs:
      replay_type:
        description: "smoke_1day | short_5days | month | full_audit | custom"
        type: choice
        options:
          - smoke_1day
          - short_5days
          - month
          - full_audit
          - custom
        default: month
      start_date:
        description: "YYYYMMDD — 새 campaign 시작일 (month/custom)"
        type: string
        default: "20260102"
      end_date:
        description: "YYYYMMDD end (month/custom/full_audit)"
        type: string
        default: ""
      campaign_id:
        description: "이어 실행할 campaign_id (resume 시 필수)"
        type: string
        default: ""
      resume_existing_campaign:
        description: "기존 campaign 이어서 실행 (chunk 최대 5거래일)"
        type: boolean
        default: false
      chunk_size_trading_days:
        description: "한 번의 실행에서 처리할 최대 거래일 수"
        type: number
        default: 5
      run_audit_ai:
        description: "Run audit committee AI evaluation"
        type: boolean
        default: false
      send_slack_reports:
        description: "주간/월간 리포트 링크 Slack only"
        type: boolean
        default: true
      persist_replay_results:
        description: "Save to data/competition/replay/ only"
        type: boolean
        default: true
      use_mock_llm:
        description: "Use mock LLM (no API calls)"
        type: boolean
        default: false

env:
  COMPETITION_EXECUTION_MODE: replay_smoke
  COMPETITION_LIVE_SCHEDULE_DISABLED: "1"
  COMPETITION_DASHBOARD_BASE_URL: https://xxxbeom-glitch.github.io/stockreport
  GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
  DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
  COMPETITION_A_MAIN_MODEL: deepseek-v4-flash
  COMPETITION_A_PARTNER_MODEL: gemini-2.5-flash-lite
  COMPETITION_B_MAIN_MODEL: gemini-2.5-flash-lite
  COMPETITION_B_PARTNER_MODEL: deepseek-v4-flash
  COMPETITION_C_MAIN_MODEL: deepseek-v4-flash
  COMPETITION_C_VALIDATOR_MODEL: gemini-2.5-flash-lite
  COMPETITION_D_MAIN_MODEL: gemini-2.5-flash-lite
  COMPETITION_D_VALIDATOR_MODEL: deepseek-v4-pro
  COMPETITION_SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_TRADING }}
  KIS_APP_KEY: ${{ secrets.KIS_APP_KEY }}
  KIS_APP_SECRET: ${{ secrets.KIS_APP_SECRET }}
  KIS_ACCOUNT_NO: ${{ secrets.KIS_ACCOUNT_NO }}
  FIREBASE_STORAGE_BUCKET: ${{ secrets.FIREBASE_STORAGE_BUCKET }}
  FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

jobs:
  replay-smoke:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.pages_deploy.outputs.page_url }}
    permissions:
      contents: write
      pages: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt || pip install pykrx pandas requests google-generativeai openai firebase-admin

      - name: Guard — no live session
        run: |
          python -c "
          import os
          os.environ['COMPETITION_EXECUTION_MODE']='replay_smoke'
          from src.trading.competition.runtime import assert_live_session_allowed
          try:
              assert_live_session_allowed()
              raise SystemExit('live session should be blocked')
          except RuntimeError:
              print('live session correctly blocked in replay mode')
          "

      - name: List resumable campaigns
        if: inputs.resume_existing_campaign != true
        run: python scripts/find_replay_campaign.py >> "$GITHUB_STEP_SUMMARY"

      - name: Run REPLAY (resume existing campaign)
        if: inputs.persist_replay_results == true && inputs.resume_existing_campaign == true
        id: replay_resume
        env:
          COMPETITION_EXECUTION_MODE: replay_smoke
          REPLAY_RESUME_CAMPAIGN: "true"
          REPLAY_CAMPAIGN_ID: ${{ inputs.campaign_id }}
        run: |
          set -o pipefail
          if [ -z "${REPLAY_CAMPAIGN_ID}" ]; then
            echo "campaign_id is required when resume_existing_campaign=true"
            exit 1
          fi
          ARGS="--replay-type ${{ inputs.replay_type }} --date ${{ inputs.start_date }}"
          ARGS="$ARGS --chunk-size-trading-days ${{ inputs.chunk_size_trading_days }}"
          ARGS="$ARGS --result-out replay_result.json"
          ARGS="$ARGS --resume-existing-campaign --campaign-id ${REPLAY_CAMPAIGN_ID}"
          if [ -n "${{ inputs.end_date }}" ]; then ARGS="$ARGS --end-date ${{ inputs.end_date }}"; fi
          if [ "${{ inputs.use_mock_llm }}" = "true" ]; then ARGS="$ARGS --mock-llm"; fi
          if [ "${{ inputs.send_slack_reports }}" != "true" ]; then ARGS="$ARGS --no-slack"; fi
          if [ "${{ inputs.run_audit_ai }}" = "true" ]; then ARGS="$ARGS --run-audit-ai"; fi
          python scripts/run_competition_replay.py $ARGS
          EXIT_CODE=$?
          python scripts/replay_workflow_outputs.py replay_result.json
          exit $EXIT_CODE

      - name: Run REPLAY (new campaign)
        if: inputs.persist_replay_results == true && inputs.resume_existing_campaign != true
        id: replay_new
        env:
          COMPETITION_EXECUTION_MODE: replay_smoke
        run: |
          set -o pipefail
          ARGS="--replay-type ${{ inputs.replay_type }} --date ${{ inputs.start_date }}"
          ARGS="$ARGS --chunk-size-trading-days ${{ inputs.chunk_size_trading_days }}"
          ARGS="$ARGS --result-out replay_result.json"
          if [ -n "${{ inputs.end_date }}" ]; then ARGS="$ARGS --end-date ${{ inputs.end_date }}"; fi
          if [ "${{ inputs.use_mock_llm }}" = "true" ]; then ARGS="$ARGS --mock-llm"; fi
          if [ "${{ inputs.send_slack_reports }}" != "true" ]; then ARGS="$ARGS --no-slack"; fi
          if [ "${{ inputs.run_audit_ai }}" = "true" ]; then ARGS="$ARGS --run-audit-ai"; fi
          python scripts/run_competition_replay.py $ARGS
          EXIT_CODE=$?
          python scripts/replay_workflow_outputs.py replay_result.json
          exit $EXIT_CODE

      - name: Resolve replay outputs
        if: inputs.persist_replay_results == true && always()
        id: replay
        run: |
          if [ -f replay_result.json ]; then
            python scripts/replay_workflow_outputs.py replay_result.json
          fi

      - name: Publish public REPLAY JSON for GitHub Pages
        if: inputs.persist_replay_results == true && steps.replay.outputs.ok == 'true'
        run: |
          CID="${{ steps.replay.outputs.campaign_id }}"
          if [ -z "$CID" ]; then CID="${{ inputs.campaign_id }}"; fi
          if [ -n "$CID" ]; then
            python scripts/publish_replay_pages_data.py --campaign "$CID"
          else
            python scripts/publish_replay_pages_data.py
          fi

      - name: Commit replay public data
        if: inputs.persist_replay_results == true && steps.replay.outputs.ok == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/replay-data/
          if git diff --staged --quiet; then
            echo "No public replay JSON changes — skip commit"
          else
            git commit -m "chore: publish replay report data"
            git pull --rebase origin main
            git push origin HEAD:main
          fi

      - uses: actions/configure-pages@v5
        if: inputs.persist_replay_results == true && steps.replay.outputs.ok == 'true'

      - uses: actions/upload-pages-artifact@v3
        if: inputs.persist_replay_results == true && steps.replay.outputs.ok == 'true'
        with:
          path: .

      - id: pages_deploy
        uses: actions/deploy-pages@v4
        if: inputs.persist_replay_results == true && steps.replay.outputs.ok == 'true'

      - name: Pages URL summary
        if: inputs.persist_replay_results == true && steps.replay.outputs.ok == 'true' && steps.pages_deploy.outputs.page_url != ''
        run: |
          echo "## GitHub Pages" >> "$GITHUB_STEP_SUMMARY"
          echo "- Dashboard base: ${{ steps.pages_deploy.outputs.page_url }}template/dashboard_desktop/?mode=replay" >> "$GITHUB_STEP_SUMMARY"
          echo "- campaign_id: \`${{ steps.replay.outputs.campaign_id }}\`" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload replay artifact
        if: inputs.persist_replay_results == true
        uses: actions/upload-artifact@v4
        with:
          name: competition-replay-${{ inputs.start_date }}
          path: data/competition/replay/

      - name: Upload observability logs (internal)
        if: inputs.persist_replay_results == true
        uses: actions/upload-artifact@v4
        with:
          name: competition-replay-observability-${{ inputs.start_date }}
          path: |
            data/competition/replay/**/observability/
          if-no-files-found: ignore

# LIVE competition auto-ops — PAUSED until REPLAY validation passes.
#
# Manual Run workflow: prints "LIVE stopped" notice + readiness report only.
# No session, account init, Slack, Firebase writes, or seed reset on dispatch.
#
# REPLAY / validation: use workflow "AI 투자 경쟁 리플레이 검증"
#   (.github/workflows/competition_replay_audit.yml)
#
# ── Restore LIVE after REPLAY audit approval ─────────────────────────────
# 1. Uncomment `schedule:` below (cron blocks).
# 2. Set env COMPETITION_LIVE_SCHEDULE_DISABLED to "0" or remove it.
# 3. Restore workflow_dispatch inputs block (dry_run, live_llm, test_slack, etc.)
#    from git history (commit before pause) or docs/ai_trading_competition/
#    REPLAY_AUDIT_SYSTEM_FINAL_REPORT.md § "LIVE schedule 복구".
# 4. Restore job steps gated on schedule / inputs (init accounts, session, …).
# 5. Set repository secret / env COMPETITION_ALLOW_LIVE_SESSION=1 for session script.
# 6. Re-enable tests in tests/competition/test_workflow_safety.py for live inputs.

name: LIVE · 실시간 투자 운용 (중지됨)

on:
  workflow_dispatch:
  # schedule:
  #   - cron: "0 0 * * 1-5"
  #   - cron: "30 6 * * 1-5"
  #   - cron: "30 7 * * 1-5"
  #   - cron: "0 11 * * 5"

env:
  COMPETITION_LIVE_SCHEDULE_DISABLED: "1"
  GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
  DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
  COMPETITION_A_MAIN_MODEL: deepseek-v4-flash
  COMPETITION_A_PARTNER_MODEL: gemini-2.5-flash-lite
  COMPETITION_B_MAIN_MODEL: gemini-2.5-flash-lite
  COMPETITION_B_PARTNER_MODEL: deepseek-v4-flash
  COMPETITION_C_MAIN_MODEL: deepseek-v4-flash
  COMPETITION_C_VALIDATOR_MODEL: gemini-2.5-flash-lite
  COMPETITION_D_MAIN_MODEL: gemini-2.5-flash-lite
  COMPETITION_D_VALIDATOR_MODEL: deepseek-v4-pro
  GEMINI_EVENT_ANALYZER_MODEL: gemini-2.5-flash-lite
  FIREBASE_STORAGE_BUCKET: ${{ secrets.FIREBASE_STORAGE_BUCKET }}
  FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
  COMPETITION_SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_TRADING }}
  KIS_APP_KEY: ${{ secrets.KIS_APP_KEY }}
  KIS_APP_SECRET: ${{ secrets.KIS_APP_SECRET }}
  KIS_ACCOUNT_NO: ${{ secrets.KIS_ACCOUNT_NO }}
  DART_API_KEY: ${{ secrets.DART_API_KEY }}
  NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
  NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}

jobs:
  live-ops-paused:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies (readiness only)
        run: |
          pip install -r requirements.txt || pip install pykrx pandas requests google-generativeai openai firebase-admin

      - name: LIVE auto-ops paused notice
        run: |
          echo "::notice title=LIVE 중지:: AI 투자 경쟁 LIVE 자동 운용은 REPLAY 검증 통과 전까지 중지되어 있습니다."
          echo ""
          echo "이 workflow Run은 다음만 수행합니다:"
          echo "  - LIVE 중지 상태 안내"
          echo "  - live ops readiness 리포트 출력 (읽기 전용)"
          echo ""
          echo "실행하지 않음: LIVE session, 계좌 초기화, Slack 발송, Firebase 쓰기, seed reset"
          echo ""
          echo "REPLAY / 검증 실행: Actions → 'AI 투자 경쟁 리플레이 검증' workflow 사용"
          echo "문서: docs/ai_trading_competition/REPLAY_AUDIT_SYSTEM_FINAL_REPORT.md"

      - name: Verify live ops readiness (read-only)
        run: |
          python -c "
          import json, sys
          from src.trading.competition.ops.readiness import check_live_readiness
          report = check_live_readiness(allow_local_mirror=False)
          summary = {
              'live_auto_ops_enabled': False,
              'live_schedule_disabled': True,
              'ready_for_live_ops': report['ready_for_live_ops'],
              'blockers': report['blockers'],
              'warnings': report['warnings'],
              'firebase': report['firebase'],
              'slack': report['slack'],
              'next_step': 'Use AI 투자 경쟁 리플레이 검증 workflow for REPLAY/AUDIT runs',
          }
          print(json.dumps(summary, ensure_ascii=False, indent=2))
          sys.exit(0)
          "

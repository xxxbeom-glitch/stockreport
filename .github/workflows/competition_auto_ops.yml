name: AI 투자 경쟁 자동 운용

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Safe manual check only (readiness + no-persist scans; no session)"
        type: boolean
        default: true
      live_llm:
        description: "Use live LLM (required with dry_run=false for manual session)"
        type: boolean
        default: false
      test_slack:
        description: "Slack 연결 테스트 메시지 발송"
        type: boolean
        default: false
      test_market_closed_notice:
        description: "휴장일/거래시간 외 Slack 알림 테스트 (시장 닫힘일 때만 발송)"
        type: boolean
        default: false
      reset_competition_seed:
        description: "seed run 데이터 초기화 (4팀 50만원 복원, 수동 확인 필요)"
        type: boolean
        default: false
  # LIVE schedule disabled until replay validation passes (see docs/ai_trading_competition/REPLAY_AUDIT_SYSTEM_FINAL_REPORT.md)
  # To re-enable: restore schedule block and set COMPETITION_LIVE_SCHEDULE_DISABLED=0 in workflow env.
  # schedule:
  #   - cron: "0 0 * * 1-5"
  #   - cron: "30 6 * * 1-5"
  #   - cron: "30 7 * * 1-5"
  #   - cron: "0 11 * * 5"

env:
  COMPETITION_LIVE_SCHEDULE_DISABLED: "1"
  # LLM API keys (Repository Secrets)
  GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
  DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
  # Role models — public values from ops/readiness.py RECOMMENDED_MODELS
  COMPETITION_A_MAIN_MODEL: deepseek-v4-flash
  COMPETITION_A_PARTNER_MODEL: gemini-2.5-flash-lite
  COMPETITION_B_MAIN_MODEL: gemini-2.5-flash-lite
  COMPETITION_B_PARTNER_MODEL: deepseek-v4-flash
  COMPETITION_C_MAIN_MODEL: deepseek-v4-flash
  COMPETITION_C_VALIDATOR_MODEL: gemini-2.5-flash-lite
  COMPETITION_D_MAIN_MODEL: gemini-2.5-flash-lite
  COMPETITION_D_VALIDATOR_MODEL: deepseek-v4-pro
  GEMINI_EVENT_ANALYZER_MODEL: gemini-2.5-flash-lite
  # Firebase — firebase_client._resolve_credentials() reads FIREBASE_SERVICE_ACCOUNT JSON directly
  FIREBASE_STORAGE_BUCKET: ${{ secrets.FIREBASE_STORAGE_BUCKET }}
  FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
  # Slack — competition channel via SLACK_WEBHOOK_TRADING → COMPETITION_SLACK_WEBHOOK
  COMPETITION_SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_TRADING }}
  # Market data / event scan (existing secrets)
  KIS_APP_KEY: ${{ secrets.KIS_APP_KEY }}
  KIS_APP_SECRET: ${{ secrets.KIS_APP_SECRET }}
  KIS_ACCOUNT_NO: ${{ secrets.KIS_ACCOUNT_NO }}
  DART_API_KEY: ${{ secrets.DART_API_KEY }}
  NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
  NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
  # Live ops: COMPETITION_USE_MOCK_LLM and COMPETITION_ALLOW_LOCAL_MIRROR must stay unset

jobs:
  competition-session:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt || pip install pykrx pandas requests google-generativeai openai firebase-admin

      - name: Verify live ops readiness
        run: |
          python -c "
          import json, sys
          from src.trading.competition.ops.readiness import check_live_readiness
          report = check_live_readiness(allow_local_mirror=False)
          summary = {
              'ready_for_live_ops': report['ready_for_live_ops'],
              'blockers': report['blockers'],
              'warnings': report['warnings'],
              'firebase': report['firebase'],
              'slack': report['slack'],
          }
          print(json.dumps(summary, ensure_ascii=False, indent=2))
          sys.exit(0 if report['ready_for_live_ops'] else 1)
          "

      - name: Send Slack connection test message
        if: github.event_name == 'workflow_dispatch' && inputs.test_slack == true
        run: python scripts/test_competition_slack.py

      - name: Slack test complete summary
        if: github.event_name == 'workflow_dispatch' && inputs.test_slack == true
        run: |
          echo "Slack connection test complete."
          echo "Ran: readiness, Slack test message only."
          echo "Skipped: account init, triggers, session, weekly report, AI, Firebase writes."

      - name: Send market closed notice (test)
        if: github.event_name == 'workflow_dispatch' && inputs.test_market_closed_notice == true
        run: python scripts/test_competition_market_closed_notice.py

      - name: Market closed notice test summary
        if: github.event_name == 'workflow_dispatch' && inputs.test_market_closed_notice == true
        run: |
          echo "Market closed notice test complete."
          echo "Ran: readiness, KST session/holiday check, Slack closed notice (only when market not tradable)."
          echo "Skipped: account init, triggers, session, weekly report, AI, Firebase writes."

      - name: Reset competition seed data
        if: github.event_name == 'workflow_dispatch' && inputs.reset_competition_seed == true
        run: python scripts/reset_competition_seed.py --confirm

      - name: Seed reset complete summary
        if: github.event_name == 'workflow_dispatch' && inputs.reset_competition_seed == true
        run: |
          echo "Competition seed reset complete."
          echo "Ran: clear seed trades/decisions/snapshots, restore 4 teams to 500,000 KRW cash."
          echo "Skipped: mock_trading, schedule live session, AI, new seed run."

      - name: Reject ambiguous manual live inputs
        if: github.event_name == 'workflow_dispatch' && inputs.test_slack != true && inputs.test_market_closed_notice != true && inputs.reset_competition_seed != true && inputs.dry_run == false && inputs.live_llm == false
        run: |
          echo "::error::Manual session refused: set dry_run=false AND live_llm=true to run a live session."
          echo "dry_run=false with live_llm=false is ambiguous and may write accounts/trades — not allowed."
          exit 1

      - name: Init competition accounts (idempotent)
        if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.test_slack != true && inputs.test_market_closed_notice != true && inputs.reset_competition_seed != true && inputs.dry_run == false && inputs.live_llm == true)
        run: python scripts/init_competition_accounts.py

      - name: Verify competition isolation (manual safe check)
        if: github.event_name == 'workflow_dispatch' && inputs.test_slack != true && inputs.test_market_closed_notice != true && inputs.reset_competition_seed != true && inputs.dry_run == true
        run: python scripts/init_competition_accounts.py --verify-isolation

      - name: Event scan (no persist)
        if: github.event_name != 'workflow_dispatch' || inputs.test_slack != true && inputs.test_market_closed_notice != true && inputs.reset_competition_seed != true
        run: python scripts/run_competition_event_scan.py --eligible-only --dry-run || true

      - name: Build decision triggers (live persist)
        if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.test_slack != true && inputs.test_market_closed_notice != true && inputs.reset_competition_seed != true && inputs.dry_run == false && inputs.live_llm == true)
        run: python scripts/build_decision_triggers.py --no-market-enrich

      - name: Build decision triggers (manual dry-run, no persist)
        if: github.event_name == 'workflow_dispatch' && inputs.test_slack != true && inputs.test_market_closed_notice != true && inputs.reset_competition_seed != true && inputs.dry_run == true
        run: python scripts/build_decision_triggers.py --no-market-enrich --dry-run

      - name: Run competition session (live)
        if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.test_slack != true && inputs.test_market_closed_notice != true && inputs.reset_competition_seed != true && inputs.dry_run == false && inputs.live_llm == true)
        env:
          COMPETITION_SLACK_DRY_RUN: "0"
        run: python scripts/run_competition_session.py --live-llm

      - name: Weekly report (Friday 20:00 KST schedule only)
        if: github.event_name == 'schedule' && github.event.schedule == '0 11 * * 5'
        run: python -c "from src.trading.competition.ops.weekly_report import build_weekly_report; build_weekly_report(force=True)"

      - name: Manual dry-run summary
        if: github.event_name == 'workflow_dispatch' && inputs.test_slack != true && inputs.test_market_closed_notice != true && inputs.reset_competition_seed != true && inputs.dry_run == true
        run: |
          echo "Manual dry-run complete."
          echo "Ran: readiness, isolation verify, event scan (--dry-run), trigger build (--dry-run)."
          echo "Skipped: account init, session, weekly report, Slack send."

      - name: Upload competition data artifact
        if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.test_slack != true && inputs.test_market_closed_notice != true && inputs.reset_competition_seed != true && inputs.dry_run == false && inputs.live_llm == true)
        uses: actions/upload-artifact@v4
        with:
          name: competition-data
          path: data/competition/

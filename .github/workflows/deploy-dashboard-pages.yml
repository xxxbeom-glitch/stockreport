# Public dashboard (GitHub Pages) — static HTML + docs/replay-data JSON for REPLAY.
# URL: https://xxxbeom-glitch.github.io/stockreport/template/dashboard_desktop/
name: DASHBOARD · 결과 화면 배포

on:
  push:
    branches: [main]
    paths:
      - "template/dashboard_desktop/**"
      - "docs/replay-data/**"
      - ".github/workflows/deploy-dashboard-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - id: deployment
        uses: actions/deploy-pages@v4

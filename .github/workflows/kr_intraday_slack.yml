# KR 관심종목 장중 슬랙 스캔 (KST 09:30 / 10:50 / 13:50 / 14:50)
name: KR Intraday Slack Scan

on:
  schedule:
    - cron: "30 0 * * 1-5"
    - cron: "50 1 * * 1-5"
    - cron: "50 4 * * 1-5"
    - cron: "50 5 * * 1-5"
  workflow_dispatch:
    inputs:
      slot:
        description: "Scan slot (0930|1050|1350|1450)"
        required: true
        default: "0930"

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Determine slot (KST)
        id: slot
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            SLOT="${{ inputs.slot }}"
          else
            HM=$(TZ=Asia/Seoul date +%H:%M)
            case "$HM" in
              09:30) SLOT=0930 ;;
              10:50) SLOT=1050 ;;
              13:50) SLOT=1350 ;;
              14:50) SLOT=1450 ;;
              *) SLOT=0930 ;;
            esac
          fi
          echo "slot=$SLOT" >> "$GITHUB_OUTPUT"
          echo "Using slot=$SLOT (KST clock for schedule)"
      - name: Run intraday scan and send Slack
        env:
          AI_PROVIDER: ${{ vars.AI_PROVIDER || 'deepseek' }}
          AI_MODEL: ${{ vars.AI_MODEL || 'deepseek-chat' }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DEEPSEEK_BASE_URL: ${{ vars.DEEPSEEK_BASE_URL || 'https://api.deepseek.com' }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_KR: ${{ secrets.SLACK_CHANNEL_KR }}
        run: python scripts/run_kr_intraday_slack.py --slot ${{ steps.slot.outputs.slot }} --live --send

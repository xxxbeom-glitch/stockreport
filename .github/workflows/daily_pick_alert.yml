# 매일 투자 후보 알림 — 오늘 볼 만한 종목을 찾아 Slack 발송 (스케줄 유지)
name: 매일 투자 후보 알림

on:
  schedule:
    - cron: "30 1 * * 0-4"
    - cron: "50 4 * * 0-4"
  workflow_dispatch:
    inputs:
      run_timing:
        description: |
          실행 기준
          · 자동 — 지금 시각에 맞춤 (12시 이전→장전, 이후→장중)
          · 장전 — 10:30 기준
          · 장중 / 장마감 — 13:50 기준
        type: choice
        options:
          - auto
          - pre_market
          - intraday
          - close
        default: auto
      use_live_data:
        description: |
          실제 데이터로 확인
          체크하면 KIS/pykrx에서 최신 시세·거래대금을 가져옵니다.
        type: boolean
        default: true
      send_slack:
        description: |
          Slack으로 보내기
          체크하면 조건에 맞는 메시지를 Slack 채널로 실제 발송합니다.
        type: boolean
        default: true
      max_pick_count:
        description: |
          최대 발송 개수
          한 번에 Slack으로 보낼 종목 수 (상한)
        type: string
        default: "3"

concurrency:
  group: daily-pick-alert-${{ github.event.schedule || inputs.run_timing || 'manual' }}
  cancel-in-progress: false

jobs:
  daily_pick:
    name: 오늘 볼 만한 종목 스캔
    runs-on: ubuntu-latest

    env:
      TZ: Asia/Seoul
      DAILY_PICK_AUTO_SEND: "true"
      WATCHLIST_REVIEW_AUTO_SEND: "false"
      WATCHLIST_AUTO_APPLY: "false"
      CANDIDATE_AUTO_REPLACE: "false"
      DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
      SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
      SLACK_CHANNEL_KR: ${{ secrets.SLACK_CHANNEL_KR }}
      KIS_APP_KEY: ${{ secrets.KIS_APP_KEY }}
      KIS_APP_SECRET: ${{ secrets.KIS_APP_SECRET }}
      GROK_API_KEY: ${{ secrets.GROK_API_KEY }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      KIS_ACCOUNT_NO: ${{ secrets.KIS_ACCOUNT_NO }}
      KRX_ID: ${{ secrets.KRX_ID }}
      KRX_PW: ${{ secrets.KRX_PW }}
      AI_PROVIDER: ${{ vars.AI_PROVIDER || 'deepseek' }}
      AI_MODEL: ${{ vars.AI_MODEL || 'deepseek-chat' }}
      AI_SOCIAL_PROVIDER: ${{ vars.AI_SOCIAL_PROVIDER || 'grok' }}
      AI_SOCIAL_MODEL: ${{ vars.AI_SOCIAL_MODEL || 'grok-3' }}
      AI_SUMMARY_PROVIDER: ${{ vars.AI_SUMMARY_PROVIDER || 'gemini' }}
      AI_SUMMARY_MODEL: ${{ vars.AI_SUMMARY_MODEL || 'gemini-1.5-flash' }}
      DEEPSEEK_BASE_URL: ${{ vars.DEEPSEEK_BASE_URL || 'https://api.deepseek.com' }}
      GROK_BASE_URL: ${{ vars.GROK_BASE_URL || 'https://api.x.ai/v1' }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: 실행 기준 → 스캔 슬롯
        id: slot
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TIMING="${{ inputs.run_timing }}"
          else
            TIMING="auto"
          fi
          case "$TIMING" in
            pre_market) SLOT=1030 ;;
            intraday|close) SLOT=1350 ;;
            auto)
              HM=$(TZ=Asia/Seoul date +%H:%M)
              case "$HM" in
                10:3*) SLOT=1030 ;;
                13:5*) SLOT=1350 ;;
                *) SLOT=1030 ;;
              esac
              ;;
            *) SLOT=1030 ;;
          esac
          echo "slot=$SLOT" >> "$GITHUB_OUTPUT"
          echo "[DAILY_PICK] run_timing=$TIMING → slot=$SLOT (KST $(TZ=Asia/Seoul date '+%H:%M'))"

      - name: Secrets 확인
        shell: bash
        run: |
          set -euo pipefail
          missing=0
          for name in DEEPSEEK_API_KEY SLACK_BOT_TOKEN SLACK_CHANNEL_KR KIS_APP_KEY KIS_APP_SECRET; do
            if [ -n "${!name:-}" ]; then echo "OK $name"; else echo "MISSING $name"; missing=1; fi
          done
          if [ "$missing" -ne 0 ]; then exit 1; fi

      - name: 매일 투자 후보 스캔 실행
        id: scan
        shell: bash
        run: |
          set -euo pipefail
          SLOT="${{ steps.slot.outputs.slot }}"
          ARGS=(python scripts/run_kr_intraday_slack.py --slot "$SLOT")

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            LIVE="${{ inputs.use_live_data }}"
            SEND="${{ inputs.send_slack }}"
            MAX="${{ inputs.max_pick_count }}"
            SCHEDULED=false
          else
            LIVE=true
            SEND=true
            MAX=3
            SCHEDULED=true
          fi

          if [ "$LIVE" = "true" ]; then ARGS+=(--live); fi
          if [ "$SEND" = "true" ]; then ARGS+=(--send); else ARGS+=(--dry-run); fi
          if [ "$SCHEDULED" = "true" ]; then ARGS+=(--scheduled); fi
          ARGS+=(--max-messages "$MAX")

          echo "Command: ${ARGS[*]}"
          set -o pipefail
          "${ARGS[@]}" 2>&1 | tee scan.log
          exit "${PIPESTATUS[0]}"

      - name: 로그 저장
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: daily-pick-${{ steps.slot.outputs.slot }}-${{ github.run_id }}
          path: |
            scan.log
            data/logs/kr_slack/*.jsonl
          if-no-files-found: ignore

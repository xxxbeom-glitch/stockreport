name: 오늘 매수 후보 알림 · 장후 후보

on:
  schedule:
    - cron: "55 6 * * 1-5"
  workflow_dispatch:
    inputs:
      use_live_data:
        description: 실제 데이터로 확인 (pykrx·KIS)
        type: boolean
        default: true
      send_slack:
        description: Slack으로 보내기
        type: boolean
        default: true
      scan_count:
        description: 스캔 종목 수
        type: string
        default: "60"
      max_pick:
        description: 최대 선정 종목 수
        type: string
        default: "5"

concurrency:
  group: tomorrow-watch-alert
  cancel-in-progress: false

jobs:
  tomorrow_watch:
    name: 장후 후보 스캔 (15:55)
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Seoul
      AI_SUMMARY_PROVIDER: gemini
      AI_SUMMARY_MODEL: gemini-3.1-pro-preview
      AI_PROVIDER: deepseek
      AI_MODEL: deepseek-v4-pro
      AI_SOCIAL_PROVIDER: grok
      AI_SOCIAL_MODEL: grok-4.3
      WATCHLIST_AUTO_APPLY: "false"
      CANDIDATE_AUTO_REPLACE: "false"
      DART_API_KEY: ${{ secrets.DART_API_KEY }}
      DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      GROK_API_KEY: ${{ secrets.GROK_API_KEY }}
      SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
      SLACK_BUY_CANDIDATE_CHANNEL: ${{ secrets.SLACK_BUY_CANDIDATE_CHANNEL }}
      SLACK_BUY_CANDIDATE_WEBHOOK: ${{ secrets.SLACK_BUY_CANDIDATE_WEBHOOK }}
      SLACK_CHANNEL_KR: ${{ secrets.SLACK_CHANNEL_KR }}
      KIS_APP_KEY: ${{ secrets.KIS_APP_KEY }}
      KIS_APP_SECRET: ${{ secrets.KIS_APP_SECRET }}
      KRX_ID: ${{ secrets.KRX_ID }}
      KRX_PW: ${{ secrets.KRX_PW }}

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - name: 장후 후보 스캔 실행
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            LIVE="${{ inputs.use_live_data }}"
            SEND="${{ inputs.send_slack }}"
          else
            LIVE=true
            SEND=true
          fi
          ARGS=(python scripts/run_tomorrow_watch_alert.py --scan-count "${{ inputs.scan_count || '60' }}" --max-pick "${{ inputs.max_pick || '5' }}")
          [ "$LIVE" = "true" ] && ARGS+=(--live-data)
          [ "$SEND" = "true" ] && ARGS+=(--send-slack)
          [ "${{ github.event_name }}" = "schedule" ] && ARGS+=(--scheduled)
          echo "Command: ${ARGS[*]}"
          "${ARGS[@]}" 2>&1 | tee scan.log

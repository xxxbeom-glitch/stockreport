# 관심종목 새벽 리포트 — 25종목 재판단 (매수 후보 알림과 독립 실행)
name: 관심종목 새벽 리포트

on:
  schedule:
    - cron: "30 20 * * 0-4"
  workflow_dispatch:
    inputs:
      use_live_data:
        description: |
          실제 데이터로 확인
          체크하면 pykrx(및 가능 시 KIS)로 최신 데이터를 수집합니다.
        type: boolean
        default: true
      include_news:
        description: |
          뉴스/공시 포함
          네이버 뉴스·DART 공시를 수집해 판단에 반영합니다.
        type: boolean
        default: true
      send_slack:
        description: |
          Slack으로 보내기
          관심종목 새벽 리포트 채널로 보냅니다.
        type: boolean
        default: false
      apply_watchlist:
        description: |
          관심종목 자동 수정
          체크해도 WATCHLIST_AUTO_APPLY 없으면 kr_watchlist.json은 바뀌지 않습니다.
        type: boolean
        default: false

concurrency:
  group: watchlist-dawn-report
  cancel-in-progress: false

jobs:
  dawn_report:
    name: 관심종목 새벽 리포트
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Seoul
      WATCHLIST_REVIEW_AUTO_SEND: "true"
      WATCHLIST_AUTO_APPLY: "false"
      CANDIDATE_AUTO_REPLACE: "false"
      DART_API_KEY: ${{ secrets.DART_API_KEY }}
      NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
      NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
      DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
      SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
      SLACK_WATCHLIST_REPORT_CHANNEL: ${{ secrets.SLACK_WATCHLIST_REPORT_CHANNEL }}
      SLACK_WATCHLIST_REPORT_WEBHOOK: ${{ secrets.SLACK_WATCHLIST_REPORT_WEBHOOK }}
      KRX_ID: ${{ secrets.KRX_ID }}
      KRX_PW: ${{ secrets.KRX_PW }}
      KIS_APP_KEY: ${{ secrets.KIS_APP_KEY }}
      KIS_APP_SECRET: ${{ secrets.KIS_APP_SECRET }}

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - name: 관심종목 새벽 리포트 실행
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            LIVE="${{ inputs.use_live_data }}"
            NEWS="${{ inputs.include_news }}"
            SEND="${{ inputs.send_slack }}"
            APPLY="${{ inputs.apply_watchlist }}"
            SCHEDULED=false
          else
            LIVE=true
            NEWS=true
            SEND=true
            APPLY=false
            SCHEDULED=true
          fi
          ARGS=(python scripts/run_weekly_watchlist_update.py --no-llm)
          if [ "$LIVE" != "true" ]; then
            ARGS+=(--pykrx-only)
          fi
          if [ "$NEWS" = "true" ]; then
            ARGS+=(--with-news)
          fi
          if [ "$SEND" = "true" ]; then
            ARGS+=(--send-slack)
          else
            ARGS+=(--no-send)
          fi
          if [ "$SCHEDULED" = "true" ]; then
            ARGS+=(--scheduled)
          fi
          if [ "$APPLY" = "true" ]; then
            ARGS+=(--apply-watchlist)
          fi
          echo "Command: ${ARGS[*]}"
          "${ARGS[@]}"

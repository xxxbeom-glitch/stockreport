# 가상투자 자동운영 — 정기 AI 판단(월·목·금) + 지정가 체결 확인(NXT 15:40~20:00 / KRX 09:10~15:30)
name: 가상투자 자동 운영

on:
  schedule:
    # 월·목·금 15:35 KST ≈ 06:35 UTC
    - cron: "35 6 * * 1,4,5"
    # 평일 체결 확인 KST 09:05~19:55 (10분 간격) ≈ UTC 00:05~10:55
    - cron: "5/10 0-10 * * 1-5"
    # NXT 당일 미체결 최종 만료 KST 20:05 ≈ 11:05 UTC
    - cron: "5 11 * * 1-5"
  workflow_dispatch:

concurrency:
  group: mock-trading-auto-ops
  cancel-in-progress: false

jobs:
  auto_ops:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - name: 가상투자 자동운영 실행
        run: python scripts/run_mock_trading_auto_ops.py
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          KIS_APP_KEY: ${{ secrets.KIS_APP_KEY }}
          KIS_APP_SECRET: ${{ secrets.KIS_APP_SECRET }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_MOCK_TRADING_WEBHOOK: ${{ secrets.SLACK_MOCK_TRADING_WEBHOOK }}
          SLACK_BUY_CANDIDATE_WEBHOOK: ${{ secrets.SLACK_BUY_CANDIDATE_WEBHOOK }}
          SLACK_BUY_CANDIDATE_CHANNEL: ${{ secrets.SLACK_BUY_CANDIDATE_CHANNEL }}

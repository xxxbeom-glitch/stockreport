# 관심종목 재평가 — 25종목 유지/주의/제외 판단 (수동 전용, 자동 스케줄 없음)
name: 관심종목 재평가 리포트

on:
  workflow_dispatch:
    inputs:
      use_live_data:
        description: |
          실제 데이터로 확인
          체크하면 pykrx(및 가능 시 KIS)로 최신 데이터를 수집합니다.
        type: boolean
        default: true
      include_news:
        description: |
          뉴스/공시 포함
          네이버 뉴스·DART 공시를 수집해 판단에 반영합니다. (시간이 더 걸릴 수 있음)
        type: boolean
        default: false
      send_slack:
        description: |
          Slack으로 보내기
          주간 재평가 요약을 Slack으로 보냅니다. (현재 기본 꺼짐 — 테스트 시에만 켜세요)
        type: boolean
        default: false
      apply_watchlist:
        description: |
          관심종목 자동 수정
          현재는 사용하지 않습니다. 체크해도 환경 설정 없으면 kr_watchlist.json은 바뀌지 않습니다.
        type: boolean
        default: false
  # schedule: (자동 재구성 중지 — 재개 시 주석 해제)
  #   - cron: "0 9 * * 5"

jobs:
  review:
    name: 관심종목 재평가
    runs-on: ubuntu-latest
    env:
      DAILY_PICK_AUTO_SEND: "true"
      WATCHLIST_REVIEW_AUTO_SEND: "false"
      WATCHLIST_AUTO_APPLY: "false"
      CANDIDATE_AUTO_REPLACE: "false"
      DART_API_KEY: ${{ secrets.DART_API_KEY }}
      NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
      NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
      DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
      SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
      SLACK_CHANNEL_KR: ${{ secrets.SLACK_CHANNEL_KR }}
      KRX_ID: ${{ secrets.KRX_ID }}
      KRX_PW: ${{ secrets.KRX_PW }}
      KIS_APP_KEY: ${{ secrets.KIS_APP_KEY }}
      KIS_APP_SECRET: ${{ secrets.KIS_APP_SECRET }}

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - name: 관심종목 재평가 실행
        shell: bash
        run: |
          set -euo pipefail
          ARGS=(python scripts/run_weekly_watchlist_update.py --no-llm)
          if [ "${{ inputs.use_live_data }}" != "true" ]; then
            ARGS+=(--pykrx-only)
          fi
          if [ "${{ inputs.include_news }}" = "true" ]; then
            ARGS+=(--with-news)
          fi
          if [ "${{ inputs.send_slack }}" = "true" ]; then
            ARGS+=(--send-slack)
          else
            ARGS+=(--no-send)
          fi
          if [ "${{ inputs.apply_watchlist }}" = "true" ]; then
            ARGS+=(--apply-watchlist)
          fi
          echo "Command: ${ARGS[*]}"
          "${ARGS[@]}"

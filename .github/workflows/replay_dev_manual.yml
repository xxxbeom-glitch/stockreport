name: "REPLAY DEV - 수동 복구 및 테스트"

on:
  workflow_dispatch:
    inputs:
      replay_type:
        description: "smoke_1day | short_5days | month | full_audit | custom"
        type: choice
        options:
          - smoke_1day
          - short_5days
          - month
          - full_audit
          - custom
        default: month
      start_date:
        description: "YYYYMMDD — 새 campaign 또는 resume 기준일"
        type: string
        default: "20260102"
      end_date:
        description: "YYYYMMDD end (month/custom/full_audit)"
        type: string
        default: ""
      campaign_id:
        description: "수동 resume 대상 campaign_id (resume 체크 시 필수)"
        type: string
        default: ""
      resume_existing_campaign:
        description: "기존 campaign 수동 resume"
        type: boolean
        default: false
      chunk_days:
        description: "한 번의 실행에서 처리할 최대 거래일 수"
        type: number
        default: 5
      run_audit_ai:
        description: "Audit committee AI 실행"
        type: boolean
        default: false
      send_slack_reports:
        description: "Slack 리포트 링크 전송"
        type: boolean
        default: true
      persist_replay_results:
        description: "data/competition/replay/ 에 저장"
        type: boolean
        default: true
      use_mock_llm:
        description: "Mock LLM (API 호출 없음)"
        type: boolean
        default: false
      publish_pages_only:
        description: "Pages publish만 (replay 실행 없음)"
        type: boolean
        default: false

env:
  COMPETITION_EXECUTION_MODE: replay_smoke
  COMPETITION_LIVE_SCHEDULE_DISABLED: "1"
  COMPETITION_DASHBOARD_BASE_URL: https://xxxbeom-glitch.github.io/stockreport
  GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
  DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
  COMPETITION_A_MAIN_MODEL: deepseek-v4-flash
  COMPETITION_A_PARTNER_MODEL: gemini-2.5-flash-lite
  COMPETITION_B_MAIN_MODEL: gemini-2.5-flash-lite
  COMPETITION_B_PARTNER_MODEL: deepseek-v4-flash
  COMPETITION_C_MAIN_MODEL: deepseek-v4-flash
  COMPETITION_C_VALIDATOR_MODEL: gemini-2.5-flash-lite
  COMPETITION_D_MAIN_MODEL: gemini-2.5-flash-lite
  COMPETITION_D_VALIDATOR_MODEL: deepseek-v4-pro
  COMPETITION_SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_TRADING }}
  KIS_APP_KEY: ${{ secrets.KIS_APP_KEY }}
  KIS_APP_SECRET: ${{ secrets.KIS_APP_SECRET }}
  KIS_ACCOUNT_NO: ${{ secrets.KIS_ACCOUNT_NO }}
  FIREBASE_STORAGE_BUCKET: ${{ secrets.FIREBASE_STORAGE_BUCKET }}
  FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

jobs:
  replay-dev:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.pages_deploy.outputs.page_url }}
    permissions:
      contents: write
      pages: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt || pip install pykrx pandas requests google-generativeai openai firebase-admin

      - name: List resumable campaigns
        if: ${{ !inputs.resume_existing_campaign && !inputs.publish_pages_only }}
        run: python scripts/find_replay_campaign.py >> "$GITHUB_STEP_SUMMARY"

      - name: Validate REPLAY workflow inputs
        if: ${{ !inputs.publish_pages_only }}
        run: |
          python scripts/validate_replay_workflow_inputs.py \
            --resume "${{ inputs.resume_existing_campaign }}" \
            --campaign-id "${{ inputs.campaign_id }}"

      - name: Publish Pages only
        if: ${{ inputs.publish_pages_only }}
        run: |
          CID="${{ inputs.campaign_id }}"
          if [ -n "$CID" ]; then
            python scripts/publish_replay_pages_data.py --campaign "$CID"
          else
            python scripts/publish_replay_pages_data.py
          fi

      - name: Run REPLAY (manual resume)
        if: ${{ inputs.persist_replay_results && inputs.resume_existing_campaign && !inputs.publish_pages_only }}
        id: replay_resume
        env:
          COMPETITION_EXECUTION_MODE: replay_smoke
        run: |
          set -o pipefail
          ARGS="--replay-type ${{ inputs.replay_type }} --date ${{ inputs.start_date }}"
          ARGS="$ARGS --chunk-size-trading-days ${{ inputs.chunk_days }}"
          ARGS="$ARGS --result-out replay_result.json"
          ARGS="$ARGS --resume-existing-campaign --campaign-id ${{ inputs.campaign_id }}"
          if [ -n "${{ inputs.end_date }}" ]; then ARGS="$ARGS --end-date ${{ inputs.end_date }}"; fi
          if [ "${{ inputs.use_mock_llm }}" = "true" ]; then ARGS="$ARGS --mock-llm"; fi
          if [ "${{ inputs.send_slack_reports }}" != "true" ]; then ARGS="$ARGS --no-slack"; fi
          if [ "${{ inputs.run_audit_ai }}" = "true" ]; then ARGS="$ARGS --run-audit-ai"; fi
          python scripts/run_competition_replay.py $ARGS
          EXIT_CODE=$?
          python scripts/replay_workflow_outputs.py replay_result.json
          exit $EXIT_CODE

      - name: Run REPLAY (manual new campaign)
        if: ${{ inputs.persist_replay_results && !inputs.resume_existing_campaign && !inputs.publish_pages_only }}
        id: replay_new
        env:
          COMPETITION_EXECUTION_MODE: replay_smoke
        run: |
          set -o pipefail
          ARGS="--replay-type ${{ inputs.replay_type }} --date ${{ inputs.start_date }}"
          ARGS="$ARGS --chunk-size-trading-days ${{ inputs.chunk_days }}"
          ARGS="$ARGS --result-out replay_result.json"
          if [ -n "${{ inputs.end_date }}" ]; then ARGS="$ARGS --end-date ${{ inputs.end_date }}"; fi
          if [ "${{ inputs.use_mock_llm }}" = "true" ]; then ARGS="$ARGS --mock-llm"; fi
          if [ "${{ inputs.send_slack_reports }}" != "true" ]; then ARGS="$ARGS --no-slack"; fi
          if [ "${{ inputs.run_audit_ai }}" = "true" ]; then ARGS="$ARGS --run-audit-ai"; fi
          python scripts/run_competition_replay.py $ARGS
          EXIT_CODE=$?
          python scripts/replay_workflow_outputs.py replay_result.json
          exit $EXIT_CODE

      - name: Resolve replay outputs
        if: inputs.persist_replay_results == true && !inputs.publish_pages_only && always()
        id: replay
        run: |
          if [ -f replay_result.json ]; then
            python scripts/replay_workflow_outputs.py replay_result.json
          fi

      - name: Publish public REPLAY JSON for GitHub Pages
        if: (inputs.publish_pages_only || steps.replay.outputs.ok == 'true')
        run: |
          CID="${{ steps.replay.outputs.campaign_id }}"
          if [ -z "$CID" ]; then CID="${{ inputs.campaign_id }}"; fi
          if [ -n "$CID" ]; then
            python scripts/publish_replay_pages_data.py --campaign "$CID"
          else
            python scripts/publish_replay_pages_data.py
          fi

      - name: Commit replay public data
        if: (inputs.publish_pages_only || steps.replay.outputs.ok == 'true')
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/replay-data/
          if git diff --staged --quiet; then
            echo "No public replay JSON changes — skip commit"
          else
            git commit -m "chore: publish replay report data"
            git pull --rebase origin main
            git push origin HEAD:main
          fi

      - uses: actions/configure-pages@v5
        if: inputs.publish_pages_only || steps.replay.outputs.ok == 'true'

      - uses: actions/upload-pages-artifact@v3
        if: inputs.publish_pages_only || steps.replay.outputs.ok == 'true'
        with:
          path: .

      - id: pages_deploy
        uses: actions/deploy-pages@v4
        if: inputs.publish_pages_only || steps.replay.outputs.ok == 'true'

      - name: Upload replay artifact
        if: inputs.persist_replay_results == true && !inputs.publish_pages_only
        uses: actions/upload-artifact@v4
        with:
          name: competition-replay-dev-${{ inputs.start_date }}
          path: data/competition/replay/
          if-no-files-found: ignore

name: 오늘 매수 후보 알림

on:
  schedule:
    - cron: "25 1 * * 1-5"
  workflow_dispatch:
    inputs:
      use_live_data:
        description: 실제 데이터로 확인
        type: boolean
        default: true
      send_slack:
        description: Slack으로 보내기
        type: boolean
        default: true
      max_pick_count:
        description: 최대 발송 개수
        type: string
        default: "3"

concurrency:
  group: morning-buy-alert
  cancel-in-progress: false

jobs:
  morning_buy:
    name: 오늘 매수 후보
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Seoul
      AI_SUMMARY_PROVIDER: gemini
      AI_SUMMARY_MODEL: gemini-3.1-pro-preview
      AI_PROVIDER: deepseek
      AI_MODEL: deepseek-v4-pro
      AI_SOCIAL_PROVIDER: grok
      AI_SOCIAL_MODEL: grok-4.3
      DAILY_PICK_AUTO_SEND: "true"
      WATCHLIST_AUTO_APPLY: "false"
      CANDIDATE_AUTO_REPLACE: "false"
      DART_API_KEY: ${{ secrets.DART_API_KEY }}
      DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      GROK_API_KEY: ${{ secrets.GROK_API_KEY }}
      SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
      SLACK_BUY_CANDIDATE_CHANNEL: ${{ secrets.SLACK_BUY_CANDIDATE_CHANNEL }}
      SLACK_BUY_CANDIDATE_WEBHOOK: ${{ secrets.SLACK_BUY_CANDIDATE_WEBHOOK }}
      SLACK_CHANNEL_KR: ${{ secrets.SLACK_CHANNEL_KR }}
      KIS_APP_KEY: ${{ secrets.KIS_APP_KEY }}
      KIS_APP_SECRET: ${{ secrets.KIS_APP_SECRET }}
      KRX_ID: ${{ secrets.KRX_ID }}
      KRX_PW: ${{ secrets.KRX_PW }}

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - name: 오늘 매수 후보 실행
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            LIVE="${{ inputs.use_live_data }}"
            SEND="${{ inputs.send_slack }}"
          else
            LIVE=true
            SEND=true
          fi
          MAX="${{ inputs.max_pick_count || '3' }}"
          ARGS=(python scripts/run_morning_buy_alert.py --max-pick "$MAX")
          [ "$LIVE" = "true" ] && ARGS+=(--live-data)
          [ "$SEND" = "true" ] && ARGS+=(--send-slack)
          [ "${{ github.event_name }}" = "schedule" ] && ARGS+=(--scheduled)
          echo "Command: ${ARGS[*]}"
          "${ARGS[@]}" 2>&1 | tee scan.log

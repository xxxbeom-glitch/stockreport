# 주간 관심종목 재평가 (수동/스케줄). 뉴스·공시는 --with-news 시 secrets 필요.
name: weekly_watchlist

on:
  workflow_dispatch:
    inputs:
      with_news:
        description: "네이버 뉴스·DART 공시 수집"
        type: boolean
        default: false
  schedule:
    # 매주 금 18:00 KST (09:00 UTC)
    - cron: "0 9 * * 5"

jobs:
  weekly:
    runs-on: ubuntu-latest
    env:
      DART_API_KEY: ${{ secrets.DART_API_KEY }}
      NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
      NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
      DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
      SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
      SLACK_CHANNEL_KR: ${{ secrets.SLACK_CHANNEL_KR }}
      KRX_ID: ${{ secrets.KRX_ID }}
      KRX_PW: ${{ secrets.KRX_PW }}
      KIS_APP_KEY: ${{ secrets.KIS_APP_KEY }}
      KIS_APP_SECRET: ${{ secrets.KIS_APP_SECRET }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - name: Run weekly watchlist
        run: |
          EXTRA=""
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ github.event.inputs.with_news }}" = "true" ]; then
            EXTRA="--with-news"
          fi
          python scripts/run_weekly_watchlist_update.py --no-llm --no-send --pykrx-only $EXTRA

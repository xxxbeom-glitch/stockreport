# 주간 관심종목 재판단/재구성 — 수동 전용 (cron 중지, WATCHLIST_REVIEW 플래그)
# 매일 투자 후보 메시지는 kr_intraday_slack.yml 과 별도
name: weekly_watchlist

on:
  workflow_dispatch:
    inputs:
      with_news:
        description: "네이버 뉴스·DART 공시 수집"
        type: boolean
        default: false
  # schedule: (관심종목 재구성 자동화 중지 — 재개 시 주석 해제)
  #   - cron: "0 9 * * 5"  # 매주 금 18:00 KST

jobs:
  weekly:
    runs-on: ubuntu-latest
    env:
      DAILY_PICK_AUTO_SEND: "true"
      WATCHLIST_REVIEW_AUTO_SEND: "false"
      WATCHLIST_AUTO_APPLY: "false"
      CANDIDATE_AUTO_REPLACE: "false"
      DART_API_KEY: ${{ secrets.DART_API_KEY }}
      NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
      NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
      DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
      SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
      SLACK_CHANNEL_KR: ${{ secrets.SLACK_CHANNEL_KR }}
      KRX_ID: ${{ secrets.KRX_ID }}
      KRX_PW: ${{ secrets.KRX_PW }}
      KIS_APP_KEY: ${{ secrets.KIS_APP_KEY }}
      KIS_APP_SECRET: ${{ secrets.KIS_APP_SECRET }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - name: Run weekly watchlist review
        run: |
          EXTRA=""
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ github.event.inputs.with_news }}" = "true" ]; then
            EXTRA="--with-news"
          fi
          python scripts/run_weekly_watchlist_update.py --no-llm --no-send --pykrx-only $EXTRA
